workflows:
  ios-build:
    name: iOS Build

    instance_type: mac_mini_m2

    environment:
      node: 20
      xcode: latest

    scripts:
      - name: Show Environment
        script: |
          echo "Node Version:"
          node --version
          echo "NPM Version:"
          npm --version
          echo "NPM Registry:"
          npm config get registry
          echo "Listing project files:"
          ls -la

      - name: Clean Workspace
        script: |
          rm -rf node_modules
          rm -f package-lock.json

      - name: Install Dependencies
        script: |
          npm install --legacy-peer-deps

      - name: Build Web App
        script: |
          npm run build

      - name: Install Capacitor CLI
        script: |
          npm install -g @capacitor/cli

      - name: Create iOS Project
        script: |
          if [ ! -d ios ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor
        script: |
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
          cd ../..

      - name: Build iOS
        script: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO

    artifacts:
      - dist/**
      - ios/**
