workflows:
  ios-capacitor:
    name: Build iOS App
    instance_type: mac_mini_m2

    environment:
      node: 20
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Build web app
        script: |
          npm run build

      - name: Install Capacitor
        script: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios

      - name: Sync iOS project
        script: |
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
          cd ../..

      - name: Build iOS
        script: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos

    artifacts:
      - ios/**/*.app
      - ios/**/*.ipa

    publishing:
      email:
        recipients:
          - your-email@example.com
